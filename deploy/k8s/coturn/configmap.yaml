apiVersion: v1
kind: ConfigMap
metadata:
  name: coturn-config
  namespace: p2p-av
  labels:
    app.kubernetes.io/name: coturn
    app.kubernetes.io/part-of: p2p-av
data:
  turnserver.conf: |
    listening-port=3478
    tls-listening-port=5349

    min-port=49152
    max-port=50200

    realm=p2p-av

    use-auth-secret
    # static-auth-secret is injected via TURN_SECRET env and
    # written into this file by the init script at startup.

    fingerprint
    lt-cred-mech

    stale-nonce=600

    total-quota=100
    bps-capacity=0
    max-bps=0

    no-multicast-peers
    no-cli

    simple-log
    verbose
