# coturn configuration for P2P A/V transmission
# This config enables the REST API for time-limited credentials
# generated by the Go signaling server.

# Listener
listening-port=3478
tls-listening-port=5349

# Relay address range
min-port=49152
max-port=65535

# Realm
realm=p2p-av

# REST API shared secret (must match signaling server's TURN_SECRET)
use-auth-secret
static-auth-secret=p2p-turn-secret

# Logging
log-file=/var/log/coturn/turnserver.log
simple-log
verbose

# Fingerprinting
fingerprint

# Long-term credential mechanism compatibility
lt-cred-mech

# STUN
stale-nonce=600

# Performance
total-quota=100
bps-capacity=0
max-bps=0

# Deny traffic to private/loopback for relay (security)
no-multicast-peers

# Uncomment and set to your server's public IP for production
# external-ip=YOUR_PUBLIC_IP

# Uncomment for TLS/DTLS (requires cert files)
# cert=/etc/coturn/cert.pem
# pkey=/etc/coturn/privkey.pem

# CLI (disabled in production)
no-cli
